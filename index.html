<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>A4-PRINT | Учёт заказов и смен</title>
    <link rel="stylesheet" href="style.css">
    <!-- Библиотека для работы с Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Простой график (Chart.js) для дашборда -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app-container">

    <!-- ШАПКА С ЛОГОТИПОМ -->
    <div class="header">
        <img src="images/logo_mini_a4_print.png" alt="A4-PRINT Logo" class="logo">
        <div class="title-block">
            <h1>A4-PRINT</h1>
            <p>Фото‑копировальный центр • Учёт заказов и зарплаты</p>
        </div>
    </div>

    <!-- Панель управления сменой -->
    <div class="control-bar">
        <div class="row">
            <div class="field">
                <label>📅 Дата смены</label>
                <input type="date" id="workDate">
            </div>
            <div class="field">
                <label>👤 Оператор</label>
                <select id="operatorSelect">
                    <option value="Наталья">Наталья (оклад 2000₽/смена)</option>
                    <option value="Павел">Павел (оклад 2500₽/смена)</option>
                    <option value="Семён">Семён (оклад 2000₽/смена)</option>
                </select>
            </div>
            <div class="field">
                <label>💰 Расходы из кассы (₽)</label>
                <input type="number" id="expenses" value="0" step="100">
            </div>
            <div class="actions">
                <button id="saveDayBtn" class="btn save">💾 Сохранить день</button>
                <button id="clearDayBtn" class="btn clear">🗑️ Очистить</button>
                <button id="exportExcelBtn" class="btn excel">📎 Excel</button>
                <button id="payrollBtn" class="btn payroll">💰 Платёжная ведомость</button>
            </div>
        </div>
    </div>

    <!-- Таблица заказов (15 строк, как вы хотели) -->
    <div class="orders-section">
        <h3>📋 ЗАКАЗЫ (до 15 операций в смену)</h3>
        <div class="table-wrapper">
            <table id="ordersTable">
                <thead>
                    <tr><th>№</th><th>🕒 Время</th><th>Услуга</th><th>Цена</th><th>Кол‑во</th><th>Сумма</th><th>Оплата</th></tr>
                </thead>
                <tbody id="ordersBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ИТОГИ ЗА ДЕНЬ (быстро, наглядно) -->
    <div class="daily-summary">
        <div class="summary-card">
            <span>💵 Доход</span>
            <strong id="totalIncome">0 ₽</strong>
        </div>
        <div class="summary-card">
            <span>💸 Расход</span>
            <strong id="totalExpenses">0 ₽</strong>
        </div>
        <div class="summary-card">
            <span>📈 Чистая прибыль</span>
            <strong id="netProfit">0 ₽</strong>
        </div>
        <div class="summary-card">
            <span>💳 Наличные</span>
            <strong id="cashTotal">0 ₽</strong>
        </div>
        <div class="summary-card">
            <span>💳 Карта</span>
            <strong id="cardTotal">0 ₽</strong>
        </div>
        <div class="summary-card">
            <span>📦 Заказов</span>
            <strong id="ordersCount">0</strong>
        </div>
    </div>

    <!-- ДАШБОРД: график выручки по дням -->
    <div class="dashboard">
        <h3>📊 Динамика чистой прибыли (последние 7 дней)</h3>
        <canvas id="profitChart" width="400" height="180" style="max-height: 220px;"></canvas>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
