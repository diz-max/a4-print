<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A4-Print | Касса</title>
    <link rel="icon" type="image/png" href="images/logo_mini_a4_print.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <img src="images/logo_mini_a4_print.png" alt="A4-Print" class="logo-img">
                    <span>A4-PRINT</span>
                </div>
                <div class="date-time" id="currentDateTime"></div>
            </div>
            <div class="header-right">
                <div class="operator">Оператор: <span id="currentOperator">Павел</span></div>
                <button class="switch-operator" onclick="switchOperator()">🔄 Сменить</button>
            </div>
        </header>

        <div class="main-screen">
            <!-- КОРЗИНА -->
            <div class="cart-section">
                <div class="cart-header">
                    <h2>🛒 ТЕКУЩИЙ ЗАКАЗ</h2>
                    <div class="cart-client">
                        <input type="text" id="clientName" placeholder="Клиент (опционально)" class="client-input">
                    </div>
                </div>
                <div class="cart-items" id="cartItems">
                    <div class="empty-cart">➕ Нажмите на услугу для добавления</div>
                </div>
                <div class="cart-total">
                    <div class="total-row">
                        <span>ИТОГО:</span>
                        <span class="total-amount" id="cartTotal">0</span>
                        <span>₽</span>
                    </div>
                    <div class="payment-row">
                        <button class="payment-btn cash-btn" onclick="setPayment('Наличные')">💵 НАЛИЧНЫЕ</button>
                        <button class="payment-btn card-btn" onclick="setPayment('Карта')">💳 КАРТА</button>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn clear-btn" onclick="clearCart()">🗑️ ОЧИСТИТЬ</button>
                        <button class="action-btn checkout-btn" onclick="checkout()">✅ ОФОРМИТЬ ЗАКАЗ</button>
                    </div>
                </div>
            </div>

            <!-- УСЛУГИ -->
            <div class="services-section">
                <div class="services-header">
                    <h2>📋 ВЫБЕРИТЕ УСЛУГУ</h2>
                    <div class="search-box">
                        <input type="text" id="serviceSearch" placeholder="🔍 Поиск услуги..." onkeyup="filterServices()">
                    </div>
                </div>
                <div class="services-grid" id="servicesGrid"></div>
            </div>
        </div>

        <footer class="footer">
            <button class="footer-btn" onclick="showOrdersHistory()">📜 ИСТОРИЯ</button>
            <button class="footer-btn" onclick="window.location.href='service.html'">🔧 СЕРВИС</button>
            <button class="footer-btn" onclick="window.location.href='directories.html'">⚙️ НАСТРОЙКИ</button>
            <button class="footer-btn" onclick="showStats()">📊 СТАТИСТИКА</button>
            <button class="footer-btn" onclick="exportData()">📎 ЭКСПОРТ</button>
        </footer>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО СТАТИСТИКИ -->
    <div id="statsModal" class="modal">
        <div class="modal-content modal-stats">
            <span class="close" onclick="closeStatsModal()">&times;</span>
            <h2>📊 СТАТИСТИКА</h2>
            <div id="statsContent"></div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ЧЕКА -->
    <div id="receiptModal" class="modal">
        <div class="modal-content modal-receipt">
            <span class="close" onclick="closeReceiptModal()">&times;</span>
            <div class="receipt" id="receiptContent"></div>
            <div class="receipt-actions">
                <button class="print-receipt-btn" onclick="printReceipt()">🖨️ ПЕЧАТАТЬ</button>
                <button class="close-receipt-btn" onclick="closeReceiptModal()">❌ ЗАКРЫТЬ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
