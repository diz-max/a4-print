<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A4-Print | Касса</title>
    <link rel="icon" type="image/png" href="images/logo_mini_a4_print.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Верхняя панель -->
        <header class="header">
            <div class="logo">
                <img src="images/logo_mini_a4_print.png" alt="A4-Print" class="logo-img">
                <span class="logo-text">A4-PRINT</span>
            </div>
            <div class="header-info">
                <div class="datetime" id="currentDateTime"></div>
                <div class="operator">
                    <span class="operator-label">Оператор</span>
                    <span class="operator-name" id="currentOperator">Павел</span>
                    <button class="operator-switch" onclick="switchOperator()">Сменить</button>
                </div>
            </div>
        </header>

        <!-- Основной контент - на весь экран -->
        <main class="main-full">
            <!-- Корзина - левая часть -->
            <div class="cart-full">
                <div class="cart-header">
                    <h2>🛒 Корзина</h2>
                    <input type="text" id="clientName" placeholder="ФИО клиента" class="client-input">
                </div>
                <div class="cart-items-full" id="cartItems">
                    <div class="cart-empty">➕ Нажмите на услугу для добавления</div>
                </div>
                <div class="cart-footer-full">
                    <div class="cart-total">
                        <span>ИТОГО</span>
                        <span class="cart-total-amount" id="cartTotal">0</span>
                        <span>₽</span>
                    </div>
                    <div class="cart-actions">
                        <button class="btn-payment cash" onclick="setPayment('Наличные')">💵 НАЛИЧНЫЕ</button>
                        <button class="btn-payment card" onclick="setPayment('Карта')">💳 КАРТА</button>
                    </div>
                    <div class="cart-buttons">
                        <button class="btn-clear" onclick="clearCart()">ОЧИСТИТЬ</button>
                        <button class="btn-checkout" onclick="checkout()">ОФОРМИТЬ</button>
                    </div>
                </div>
            </div>

            <!-- Услуги - правая часть -->
            <div class="services-full">
                <div class="services-header">
                    <h2>📋 Услуги</h2>
                    <input type="text" id="serviceSearch" placeholder="🔍 Поиск услуги" class="search-input" oninput="filterServices()">
                </div>
                <div class="services-grid-full" id="servicesGrid"></div>
            </div>
        </main>

        <!-- Нижняя панель с крупными кнопками -->
        <footer class="footer-full">
            <button class="footer-btn-full" onclick="showOrdersHistory()">📜 ИСТОРИЯ</button>
            <button class="footer-btn-full" onclick="window.location.href='service.html'">🔧 СЕРВИС</button>
            <button class="footer-btn-full" onclick="window.location.href='directories.html'">⚙️ НАСТРОЙКИ</button>
            <button class="footer-btn-full" onclick="showStats()">📊 СТАТИСТИКА</button>
            <button class="footer-btn-full" onclick="exportData()">📎 ЭКСПОРТ</button>
        </footer>
    </div>

    <!-- Модальное окно статистики -->
    <div id="statsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Статистика</h2>
                <button class="modal-close" onclick="closeStatsModal()">×</button>
            </div>
            <div class="modal-body" id="statsContent"></div>
        </div>
    </div>

    <!-- Модальное окно бланка заказа -->
    <div id="orderFormModal" class="modal">
        <div class="modal-content modal-order">
            <div class="modal-header">
                <h2>Бланк заказа</h2>
                <button class="modal-close" onclick="closeOrderFormModal()">×</button>
            </div>
            <div class="modal-body" id="orderFormContent"></div>
            <div class="modal-footer">
                <button class="btn-print" onclick="printOrderForm()">🖨️ ПЕЧАТЬ</button>
                <button class="btn-secondary" onclick="closeOrderFormModal()">ЗАКРЫТЬ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
