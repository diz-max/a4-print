<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A4-Print | Сервис</title>
    <link rel="icon" type="image/png" href="images/logo_mini_a4_print.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <img src="images/logo_mini_a4_print.png" alt="A4-Print" class="logo-img">
                    <span>A4-PRINT</span>
                </div>
                <div class="date-time" id="currentDateTime"></div>
            </div>
            <div class="header-right">
                <button class="back-btn" onclick="window.location.href='index.html'">← НАЗАД</button>
            </div>
        </header>

        <div class="service-main">
            <div class="service-left">
                <div class="service-form-card">
                    <h2>📝 НОВЫЙ РЕМОНТ</h2>
                    <div class="service-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>👤 Клиент *</label>
                                <input type="text" id="repairClient" placeholder="ФИО клиента">
                            </div>
                            <div class="form-group">
                                <label>📞 Телефон</label>
                                <input type="tel" id="repairPhone" placeholder="+7 XXX XXX-XX-XX">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>🖥️ Оборудование *</label>
                                <input type="text" id="repairEquipment" placeholder="Ноутбук, телефон...">
                            </div>
                            <div class="form-group">
                                <label>📱 Модель</label>
                                <input type="text" id="repairModel" placeholder="Модель устройства">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>🔢 Серийный номер</label>
                                <input type="text" id="repairSerial" placeholder="SN / IMEI">
                            </div>
                            <div class="form-group">
                                <label>💰 Стоимость</label>
                                <input type="number" id="repairCost" placeholder="0" value="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>⚠️ Неисправность</label>
                            <textarea id="repairIssue" rows="2" placeholder="Опишите проблему..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>📦 Комплектация</label>
                            <input type="text" id="repairAccessories" placeholder="Зарядное устройство, коробка...">
                        </div>
                        <button class="submit-btn" onclick="addRepair()">✅ ДОБАВИТЬ</button>
                    </div>
                </div>
            </div>

            <div class="service-right">
                <div class="service-list-card">
                    <div class="list-header">
                        <h2>📋 АКТИВНЫЕ РЕМОНТЫ</h2>
                        <div class="list-actions">
                            <button onclick="refreshRepairsList()">🔄 ОБНОВИТЬ</button>
                            <button onclick="exportRepairs()">📎 ЭКСПОРТ</button>
                        </div>
                    </div>
                    <div class="repairs-list" id="repairsList"></div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <button class="footer-btn" onclick="window.location.href='index.html'">🏠 ГЛАВНАЯ</button>
            <button class="footer-btn" onclick="showServiceStats()">📊 СТАТИСТИКА</button>
        </footer>
    </div>

    <div id="printModal" class="modal">
        <div class="modal-content modal-print">
            <span class="close" onclick="closePrintModal()">&times;</span>
            <div class="print-buttons">
                <button class="print-btn-large" onclick="printAcceptance()">📄 ПРИЁМ</button>
                <button class="print-btn-large success" onclick="printIssue()">📋 ВЫДАЧА</button>
            </div>
        </div>
    </div>

    <script src="service.js"></script>
</body>
</html>
